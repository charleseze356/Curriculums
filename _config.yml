title: Curriculums
description: Charles's self-built, grounded learning roadmaps — what to master for a topic, and in what order.
baseurl: "/Curriculums"
url: "https://charleseze356.github.io"

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: ~

plugins:
  - jekyll-seo-tag

exclude:
  - PLAN.md
  - MISSION.md
  - RESOURCES.md
  - CONTEXT.md
  - CLAUDE.md
  - GLOSSARY.md
  - learning-records/
  - reference/
  - skills-lock.json
  - Gemfile
  - Gemfile.lock
  - "*.sh"
